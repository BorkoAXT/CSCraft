name: Deploy Playground + Docs

on:
  push:
    branches: [origin-interpreter]
    paths:
      - 'Playground/**'
      - 'Transpiler/**'
      - 'CSharpStubs/**'
      - 'site/**'
      - 'scripts/generate-manifest.js'
      - '.github/workflows/playground.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node — API manifest ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate API manifest
        run: node scripts/generate-manifest.js

      # ── .NET 9 — Blazor WASM ─────────────────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore & Publish
        run: |
          dotnet restore Playground/Playground.csproj
          dotnet publish Playground/Playground.csproj \
            -c Release \
            --no-restore \
            -o out/publish

      # ── Assemble deploy directory ─────────────────────────────────────────────
      #
      #   out/deploy/
      #     index.html         ← docs page (from site/index.html in source branch)
      #     playground/
      #       index.html       ← Blazor app with correct <base href>
      #       _framework/
      #       css/ js/ api-manifest.json
      #
      - name: Assemble deploy directory
        run: |
          mkdir -p out/deploy/playground

          # Docs: use the clean source file — never read from gh-pages
          cp site/index.html out/deploy/index.html

          # Playground: Blazor publish output
          cp -r out/publish/wwwroot/. out/deploy/playground/

          # Fix <base href> for GitHub Pages: /CSCraft/playground/
          sed -i 's|<base href="/" />|<base href="/CSCraft/playground/" />|g' \
            out/deploy/playground/index.html

          echo "=== Deploy tree ==="
          find out/deploy -not -path '*/\.*' -type f | sort | grep -v _framework | head -30

      # ── Deploy to gh-pages via JamesIves ──────────────────────────────────────
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out/deploy
          clean: true

      # ── Add .nojekyll directly so Jekyll doesn't block _framework/ ────────────
      # JamesIves doesn't reliably deploy dotfiles, so we commit it ourselves.
      - name: Add .nojekyll to gh-pages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin gh-pages
          git checkout gh-pages

          if [ ! -f .nojekyll ]; then
            touch .nojekyll
            git add .nojekyll
            git commit -m "Add .nojekyll to disable Jekyll processing"
            git push origin gh-pages
            echo ".nojekyll added"
          else
            echo ".nojekyll already present"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
